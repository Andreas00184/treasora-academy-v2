<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — Treasora Academy</title>
  <link rel="stylesheet" href="css/site.css">
</head>
<body>
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo"><img src="assets/treasora-logo.png" alt="Treasora Academy"></a>
      <button class="nav-toggle" aria-label="Menu" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="learn.html">Learn</a>
        <a href="ask-dominar.html">Ask Dominar</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="passport.html">Passport</a>
        <a href="join-pro.html">Join Pro</a>
        <a href="sign-in.html">Sign In</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="auth-card">
      <h1>Set new password</h1>
      <p class="auth-sub">Choose a strong password for your account.</p>
      <div id="auth-msg" class="auth-msg" style="display:none"></div>
      <form id="update-form">
        <div class="form-group">
          <label for="password">New password</label>
          <input type="password" id="password" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="password2">Confirm password</label>
          <input type="password" id="password2" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Update password</button>
      </form>
      <p class="auth-footer"><a href="sign-in.html">Back to sign in</a></p>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>© 2026 Treasora Academy. All rights reserved.</p>
      <div class="footer-links">
        <a href="privacy.html">Privacy</a>
        <a href="terms.html">Terms</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (async function () {
      const msg = document.getElementById('auth-msg');
      const form = document.getElementById('update-form');

      if (!window.SUPABASE_CONFIGURED) {
        msg.textContent = 'Supabase is not configured. Edit js/config.js.';
        msg.className = 'auth-msg error';
        msg.style.display = 'block';
        form.style.display = 'none';
        return;
      }

      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const accessToken = params.get('access_token');
      const refreshToken = params.get('refresh_token');
      const type = params.get('type');

      if (type === 'recovery' && accessToken && refreshToken) {
        const { error } = await supabaseClient.auth.setSession({
          access_token: accessToken,
          refresh_token: refreshToken,
        });
        if (error) {
          msg.textContent = 'This reset link is invalid or expired. Request a new one.';
          msg.className = 'auth-msg error';
          msg.style.display = 'block';
          form.style.display = 'none';
          return;
        }
        history.replaceState(null, '', window.location.pathname);
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const p1 = document.getElementById('password').value;
        const p2 = document.getElementById('password2').value;
        if (p1 !== p2) {
          msg.textContent = 'Passwords do not match.';
          msg.className = 'auth-msg error';
          msg.style.display = 'block';
          return;
        }
        const { error } = await supabaseClient.auth.updateUser({ password: p1 });
        if (error) {
          msg.textContent = error.message;
          msg.className = 'auth-msg error';
          msg.style.display = 'block';
          return;
        }
        msg.textContent = 'Password updated. Redirecting to sign in…';
        msg.className = 'auth-msg success';
        msg.style.display = 'block';
        setTimeout(() => { window.location.href = 'sign-in.html'; }, 2000);
      });
    })();
  </script>
</body>
</html>
